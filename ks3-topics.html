<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS3 Subtopics</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- BACK BUTTON -->
    <button class="back-btn" onclick="goBack()">Back</button>

    <!-- WELCOME -->
    <div id="userWelcome" class="welcome-banner" style="text-align:center; width:100%;"></div>

    <!-- LANGUAGE -->
    <div class="language-selector" style="position:absolute; top:15px; right:110px;">
        <select id="languageSelect" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="ar">العربية</option>
        </select>
    </div>

    <!-- LOGOUT -->
    <button id="logoutBtn" class="logout-btn" style="top:15px; right:20px;">Logout</button>

    <!-- MAIN -->
    <div id="ks3Screen" class="menu-screen">
        <h1 class="menu-title" id="categoryTitle">KS3 Subtopics</h1>
        <div id="topicButtons" class="button-row"></div>
    </div>

    <script type="module" src="./headerUser.js"></script>

    <script type="module">

        import { ks3Topics } from "./ks3Topics.js";

        const params = new URLSearchParams(window.location.search);
        const category = decodeURIComponent(params.get("category"));

        document.getElementById("categoryTitle").innerText = category;

        const container = document.getElementById("topicButtons");
        const topics = ks3Topics[category];

        topics.forEach(topic => {
        const btn = document.createElement("button");
        btn.className = "menu-btn";
        btn.innerText = topic;

        if (topic === "Data Types" || topic === "Variables and Values" || topic === "Health and Safety Act" || topic === "Computer Misuse Act" || topic === "Data Protection Act") {
            // ✅ Active and clickable
            btn.onclick = () => {
            window.location.href = `ks3-topic-options.html?course=KS3&unit=${encodeURIComponent(category)}&topic=${encodeURIComponent(topic)}`;
            };
        } else {
            // 🔒 Locked / Coming Soon
            btn.classList.add("locked");
            btn.onclick = () => alert(`${topic} is locked — Coming Soon!`);
            btn.innerHTML = `${topic} <span style="font-weight:700;">🔒 </span>`;
        }

        container.appendChild(btn);
        });

        function changeLanguage(lang) {
        alert("Language changed to: " + lang);
        }
    </script>


    <script>
    function goBack() {
        if (document.referrer !== "") window.history.back();
        else window.location.href = "home.html";
    }
    </script>

</body>
</html>
