<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Learn with Mr Salim </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="menu-screen">
        <h1 class="menu-title">Learn with Mr Salim</h1>
        <p class="menu-subtitle">Choose how you want to play</p>

        <div class="button-column">

            <!-- GOOGLE LOGIN BUTTON -->
            <button id="googleLoginBtn" class="menu-btn google-btn">
                Sign in with Google
            </button>

            <!-- MICROSOFT LOGIN BUTTON -->
            <button id="microsoftLoginBtn" class="menu-btn microsoft-btn">
                Sign in with Microsoft
            </button>

            <!-- PLAY WITHOUT LOGIN -->
            <button id="playBtn" class="menu-btn guest-btn">
                Play
            </button>

        </div>
    </div>

    <!-- LOAD FIREBASE FIRST -->
    <script type="module" src="./js/firebaseConfig.js"></script>
    <script type="module" src="js/login.js"></script>
</body>
</html>
